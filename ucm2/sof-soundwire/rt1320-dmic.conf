# Use case Configuration for RT1320 SoundWire DMIC (microphone function)

DefineMacro.rt1320dmic.If.0 {
	Condition {
		Type RegexMatch
		Regex "${var:__ForMics}"
		String "${var:Mics}"
	}
	True {
		EnableSequence [
			cset "name='rt1320-${var:__Mic} FU Capture Switch' 1"
		]
		DisableSequence [
			cset "name='rt1320-${var:__Mic} FU Capture Switch' 0"
		]
	}
}

If.codecmic {
	Condition {
		Type String
		Needle "rt1320"
		Haystack "${var:MicCodec1}"
	}
	True {
		SectionDevice."Mic" {
			Comment	"Microphones"

			Macro.num1.rt1320dmic { ForMics "1" Mic 1 }
			Macro.num2.rt1320dmic { ForMics "2" Mic 1 }
			Macro.num3.rt1320dmic { ForMics "2" Mic 2 }

			Value {
				CapturePriority 100
				CapturePCM "hw:${CardId},4"
				CaptureMixerElem "${var:MicMixerElem}"
				CaptureSwitch "${var:MicMixerElem} Capture Switch"
			}
		}
	}
}
