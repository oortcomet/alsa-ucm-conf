# RT1320 DMIC specific switch control settings

Define.MicMixerElem "rt1320-1 FU"

DefineMacro.rt1320micled.If.0 {
	Condition {
		Type RegexMatch
		Regex "${var:__ForMics}"
		String "${var:Mics}"
	}
	True.Macro [{ SetLED { LED="mic" Action="attach" CtlId="rt1320-${var:__Mic} FU Capture Switch" } }]
}

If.mic_init_rt1320 {
	Condition {
		Type String
		Needle "rt1320"
		Haystack "${var:MicCodec1}"
	}
	True {
		Macro.num1.rt1320micled { ForMics "1" Mic 1 }
		Macro.num2.rt1320micled { ForMics "2" Mic 1 }
		Macro.num3.rt1320micled { ForMics "2" Mic 2 }
	}
}

If.twoMics {
	Condition {
		Type RegexMatch
		Regex "2"
		String "${var:Mics}"
	}
	True {
		Define.MicMixerElem "rt1320 FU"
		LibraryConfig.remap.Config {
			ctl.default.map {
				"name='rt1320 FU Capture Switch'" {
					"name='rt1320-1 FU Capture Switch'".vindex.0 [0 1 2 3]
					"name='rt1320-2 FU Capture Switch'".vindex.1 [0 1 2 3]
				}
			}
		}
	}
}
